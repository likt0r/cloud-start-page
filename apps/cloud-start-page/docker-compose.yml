services:
  cloud-start-page:
    build:
      context: ../..
      dockerfile: apps/cloud-start-page/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - data:/data
    environment:
      DATABASE_PATH: /data/db.sqlite
      ADMIN_GROUP: cloud-admins

      # Keycloak OIDC — individual URLs so nothing is baked into the image
      NUXT_OIDC_PROVIDERS_KEYCLOAK_BASE_URL: ${NUXT_OIDC_PROVIDERS_KEYCLOAK_BASE_URL}
      NUXT_OIDC_PROVIDERS_KEYCLOAK_CLIENT_ID: ${NUXT_OIDC_PROVIDERS_KEYCLOAK_CLIENT_ID}
      NUXT_OIDC_PROVIDERS_KEYCLOAK_CLIENT_SECRET: ${NUXT_OIDC_PROVIDERS_KEYCLOAK_CLIENT_SECRET}
      NUXT_OIDC_PROVIDERS_KEYCLOAK_REDIRECT_URI: ${NUXT_OIDC_PROVIDERS_KEYCLOAK_REDIRECT_URI}
      NUXT_OIDC_PROVIDERS_KEYCLOAK_LOGOUT_REDIRECT_URI: ${NUXT_OIDC_PROVIDERS_KEYCLOAK_LOGOUT_REDIRECT_URI}
      NUXT_OIDC_PROVIDERS_KEYCLOAK_AUTHORIZATION_URL: ${NUXT_OIDC_PROVIDERS_KEYCLOAK_AUTHORIZATION_URL}
      NUXT_OIDC_PROVIDERS_KEYCLOAK_TOKEN_URL: ${NUXT_OIDC_PROVIDERS_KEYCLOAK_TOKEN_URL}
      NUXT_OIDC_PROVIDERS_KEYCLOAK_USER_INFO_URL: ${NUXT_OIDC_PROVIDERS_KEYCLOAK_USER_INFO_URL}
      NUXT_OIDC_PROVIDERS_KEYCLOAK_LOGOUT_URL: ${NUXT_OIDC_PROVIDERS_KEYCLOAK_LOGOUT_URL}
      NUXT_OIDC_TOKEN_KEY: ${NUXT_OIDC_TOKEN_KEY}
      NUXT_OIDC_SESSION_SECRET: ${NUXT_OIDC_SESSION_SECRET}
      NUXT_OIDC_AUTH_SESSION_SECRET: ${NUXT_OIDC_AUTH_SESSION_SECRET}
    restart: unless-stopped

volumes:
  data:
